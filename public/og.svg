<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow" cx="15%" cy="85%" r="55%">
      <stop offset="0%" stop-color="#a6f55b" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#0e0d0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="15%" r="45%">
      <stop offset="0%" stop-color="#a6f55b" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#0e0d0b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0e0d0b"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Outer border -->
  <rect x="1" y="1" width="1198" height="628" fill="none" stroke="#ece8df" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="1200" height="46" fill="#0a0908"/>
  <rect x="0" y="46" width="1200" height="1" fill="#ece8df" fill-opacity="0.08"/>

  <!-- Traffic lights -->
  <circle cx="26" cy="23" r="6.5" fill="#ff5f57"/>
  <circle cx="48" cy="23" r="6.5" fill="#febc2e"/>
  <circle cx="70" cy="23" r="6.5" fill="#28c840"/>

  <!-- Tab text -->
  <text x="98" y="28" font-family="'Courier New', Courier, monospace" font-size="12" fill="#8a8270">bash — portfolio · ~/hector</text>

  <!-- Live dot + label -->
  <circle cx="1140" cy="23" r="5" fill="#a6f55b"/>
  <text x="1153" y="28" font-family="'Courier New', Courier, monospace" font-size="12" fill="#a6f55b">live</text>

  <!-- Prompt line -->
  <text x="60" y="112" font-family="'Courier New', Courier, monospace" font-size="15" fill="#a6f55b">➜  ~  whoami</text>

  <!-- > hector -->
  <text x="60" y="248" font-family="'Courier New', Courier, monospace" font-size="108" font-weight="500" fill="#8a8270" letter-spacing="-3">&gt;</text>
  <text x="130" y="248" font-family="'Courier New', Courier, monospace" font-size="108" font-weight="500" fill="#ece8df" letter-spacing="-3"> hector</text>

  <!-- almonte -->
  <text x="130" y="360" font-family="'Courier New', Courier, monospace" font-size="108" font-weight="500" fill="#a6f55b" letter-spacing="-3">almonte</text>

  <!-- cursor block after almonte (7 chars × ~65px ≈ 455 + 130 offset = 585) -->
  <rect x="600" y="275" width="52" height="88" fill="#a6f55b" rx="2"/>

  <!-- .dev -->
  <text x="130" y="435" font-family="'Courier New', Courier, monospace" font-size="62" fill="#8a8270">.</text>
  <text x="172" y="435" font-family="Georgia, 'Times New Roman', serif" font-size="62" font-style="italic" fill="#bdb6a6">dev</text>

  <!-- Horizontal rule -->
  <rect x="60" y="460" width="480" height="1" fill="#ece8df" fill-opacity="0.1"/>

  <!-- Role line -->
  <text x="60" y="496" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#8a8270">Full Stack Developer · Ilo, Peru · GMT-05:00</text>

  <!-- Stack chips -->
  <rect x="60" y="518" width="118" height="26" rx="3" fill="#171513" stroke="#ece8df" stroke-opacity="0.1" stroke-width="1"/>
  <text x="70" y="536" font-family="'Courier New', Courier, monospace" font-size="12" fill="#ece8df">TypeScript</text>

  <rect x="188" y="518" width="70" height="26" rx="3" fill="#171513" stroke="#ece8df" stroke-opacity="0.1" stroke-width="1"/>
  <text x="198" y="536" font-family="'Courier New', Courier, monospace" font-size="12" fill="#ece8df">React</text>

  <rect x="268" y="518" width="78" height="26" rx="3" fill="#171513" stroke="#ece8df" stroke-opacity="0.1" stroke-width="1"/>
  <text x="278" y="536" font-family="'Courier New', Courier, monospace" font-size="12" fill="#ece8df">Node.js</text>

  <rect x="356" y="518" width="104" height="26" rx="3" fill="#171513" stroke="#ece8df" stroke-opacity="0.1" stroke-width="1"/>
  <text x="366" y="536" font-family="'Courier New', Courier, monospace" font-size="12" fill="#ece8df">PostgreSQL</text>

  <rect x="470" y="518" width="56" height="26" rx="3" fill="#171513" stroke="#ece8df" stroke-opacity="0.1" stroke-width="1"/>
  <text x="480" y="536" font-family="'Courier New', Courier, monospace" font-size="12" fill="#ece8df">.NET</text>

  <!-- open-to-work bottom right -->
  <circle cx="1076" cy="594" r="5" fill="#a6f55b"/>
  <text x="1090" y="599" font-family="'Courier New', Courier, monospace" font-size="13" fill="#a6f55b">open-to-work · 2026</text>
</svg>
